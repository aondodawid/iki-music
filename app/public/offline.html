<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IKI Music Studio - Offline</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
        color: #e2e8f0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
      }
      .card {
        max-width: 32rem;
        width: 100%;
        border: 1px solid #334155;
        border-radius: 0.75rem;
        padding: 1.5rem;
        background: rgba(15, 23, 42, 0.7);
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.5rem;
      }
      p {
        margin: 0.5rem 0;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You are offline</h1>
      <p>IKI Music Studio is currently using offline mode.</p>
      <p>Reconnect to refresh AI generation and sync the latest content.</p>
    </main>
  </body>
</html>
